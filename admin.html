<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vega Courier — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Space+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #0e0e0e; color: #f0ede6; min-height: 100vh; }

  /* LOGIN */
  .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
  .login-box { background: #161616; border: 0.5px solid #2a2a2a; border-radius: 12px; padding: 2rem; width: 100%; max-width: 380px; }
  .login-logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; margin-bottom: 0.25rem; }
  .login-logo span { color: #c9a84c; }
  .login-sub { font-size: 12px; color: #555; font-family: 'Space Mono', monospace; margin-bottom: 2rem; }
  .field { margin-bottom: 1rem; }
  .field label { font-size: 10px; font-family: 'Space Mono', monospace; letter-spacing: 1px; color: #555; text-transform: uppercase; display: block; margin-bottom: 0.4rem; }
  .field input { width: 100%; height: 44px; background: #0e0e0e; border: 1px solid #333; border-radius: 8px; color: #f0ede6; font-size: 14px; padding: 0 1rem; }
  .field input:focus { outline: none; border-color: #c9a84c; }
  .btn-gold { width: 100%; height: 44px; background: #c9a84c; color: #0e0e0e; border: none; border-radius: 8px; font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; cursor: pointer; margin-top: 0.5rem; }
  .btn-gold:hover { background: #d4b055; }
  .err { font-size: 12px; color: #e06060; margin-top: 0.75rem; text-align: center; min-height: 18px; }

  /* DASHBOARD */
  .dash { display: none; }
  .dash.show { display: block; }
  .topbar { display: flex; justify-content: space-between; align-items: center; padding: 1.25rem 2rem; border-bottom: 0.5px solid #2a2a2a; }
  .topbar-logo { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; }
  .topbar-logo span { color: #c9a84c; }
  .topbar-right { display: flex; align-items: center; gap: 1rem; }
  .admin-tag { font-family: 'Space Mono', monospace; font-size: 10px; color: #555; letter-spacing: 1px; }
  .btn-outline { background: transparent; border: 0.5px solid #333; border-radius: 6px; color: #888; font-size: 12px; padding: 6px 14px; cursor: pointer; }
  .btn-outline:hover { border-color: #555; color: #f0ede6; }

  .dash-body { max-width: 900px; margin: 0 auto; padding: 2rem; }
  .section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
  .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: #f0ede6; }
  .btn-add { background: #c9a84c; color: #0e0e0e; border: none; border-radius: 8px; font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1px; padding: 8px 20px; cursor: pointer; }
  .btn-add:hover { background: #d4b055; }

  /* SHIPMENTS LIST */
  .ship-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 2.5rem; }
  .ship-card { background: #161616; border: 0.5px solid #2a2a2a; border-radius: 10px; padding: 1rem 1.25rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.75rem; }
  .ship-code { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; color: #f0ede6; }
  .ship-route { font-size: 12px; color: #666; margin-top: 2px; }
  .ship-status { font-family: 'Space Mono', monospace; font-size: 10px; padding: 4px 10px; border-radius: 20px; background: #1a2e1a; color: #5dca84; }
  .ship-status.pending { background: #2e2a1a; color: #c9a84c; }
  .ship-actions { display: flex; gap: 8px; }
  .btn-edit { background: #1e1e1e; border: 0.5px solid #333; border-radius: 6px; color: #c9a84c; font-size: 12px; padding: 6px 14px; cursor: pointer; }
  .btn-edit:hover { border-color: #c9a84c; }
  .btn-del { background: #1e1e1e; border: 0.5px solid #333; border-radius: 6px; color: #e06060; font-size: 12px; padding: 6px 14px; cursor: pointer; }
  .btn-del:hover { border-color: #e06060; }
  .empty { text-align: center; padding: 3rem; color: #444; font-size: 14px; border: 0.5px dashed #2a2a2a; border-radius: 10px; }

  /* MODAL */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
  .modal-bg.open { display: flex; }
  .modal { background: #161616; border: 0.5px solid #2a2a2a; border-radius: 12px; padding: 1.75rem; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
  .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; margin-bottom: 1.25rem; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.25rem; }
  .form-field label { font-size: 10px; font-family: 'Space Mono', monospace; letter-spacing: 1px; color: #555; text-transform: uppercase; display: block; margin-bottom: 0.4rem; }
  .form-field input, .form-field select { width: 100%; height: 40px; background: #0e0e0e; border: 1px solid #333; border-radius: 6px; color: #f0ede6; font-size: 13px; padding: 0 0.75rem; }
  .form-field input:focus, .form-field select:focus { outline: none; border-color: #c9a84c; }
  .form-field select option { background: #1a1a1a; }
  .full { grid-column: 1 / -1; }

  .timeline-section { margin-bottom: 1.25rem; }
  .tl-title { font-size: 10px; font-family: 'Space Mono', monospace; letter-spacing: 1px; color: #555; text-transform: uppercase; margin-bottom: 0.75rem; }
  .tl-item { background: #0e0e0e; border: 0.5px solid #2a2a2a; border-radius: 8px; padding: 0.75rem; margin-bottom: 8px; display: grid; grid-template-columns: 1fr 1fr auto auto; gap: 8px; align-items: center; }
  .tl-item input { height: 34px; background: #161616; border: 1px solid #2a2a2a; border-radius: 6px; color: #f0ede6; font-size: 12px; padding: 0 0.5rem; width: 100%; }
  .tl-item input:focus { outline: none; border-color: #c9a84c; }
  .tl-item select { height: 34px; background: #161616; border: 1px solid #2a2a2a; border-radius: 6px; color: #f0ede6; font-size: 12px; padding: 0 0.5rem; }
  .tl-item select option { background: #1a1a1a; }
  .btn-rem { background: transparent; border: none; color: #e06060; font-size: 16px; cursor: pointer; padding: 0 4px; }
  .btn-add-tl { background: #1a1a1a; border: 0.5px dashed #333; border-radius: 6px; color: #666; font-size: 12px; padding: 8px; width: 100%; cursor: pointer; margin-top: 4px; }
  .btn-add-tl:hover { border-color: #c9a84c; color: #c9a84c; }

  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 1rem; }
  .btn-cancel { background: transparent; border: 0.5px solid #333; border-radius: 6px; color: #888; font-size: 13px; padding: 8px 20px; cursor: pointer; }
  .btn-save { background: #c9a84c; color: #0e0e0e; border: none; border-radius: 6px; font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1px; padding: 8px 24px; cursor: pointer; }
  .btn-save:hover { background: #d4b055; }
  .msg { font-size: 12px; color: #5dca84; margin-top: 0.5rem; text-align: center; min-height: 18px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">VEGA<span>.</span> ADMIN</div>
    <div class="login-sub">// restricted access</div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pwInput" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')doLogin()" />
    </div>
    <button class="btn-gold" onclick="doLogin()">ENTER</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dash" id="dash">
  <div class="topbar">
    <div class="topbar-logo">VEGA<span>.</span> ADMIN</div>
    <div class="topbar-right">
      <div class="admin-tag">// admin panel</div>
      <button class="btn-outline" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="dash-body">
    <div class="section-head">
      <div class="section-title">All Shipments</div>
      <button class="btn-add" onclick="openModal()">+ New Shipment</button>
    </div>
    <div class="ship-list" id="shipList"><div class="empty">Loading shipments...</div></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-title" id="modalTitle">New Shipment</div>
    <div class="form-grid">
      <div class="form-field">
        <label>Tracking Code</label>
        <input id="f_code" placeholder="TRK-0001" />
      </div>
      <div class="form-field">
        <label>Status</label>
        <input id="f_status" placeholder="In transit" />
      </div>
      <div class="form-field">
        <label>Origin</label>
        <input id="f_origin" placeholder="Dubai" />
      </div>
      <div class="form-field">
        <label>Destination</label>
        <input id="f_dest" placeholder="Vienna" />
      </div>
      <div class="form-field">
        <label>Description</label>
        <input id="f_desc" placeholder="Industrial equipment" />
      </div>
      <div class="form-field">
        <label>Weight</label>
        <input id="f_weight" placeholder="340 kg" />
      </div>
      <div class="form-field full">
        <label>Service</label>
        <input id="f_service" placeholder="Sea Freight — FCL" />
      </div>
      <div class="form-field full">
        <label>Progress (0–100)</label>
        <input id="f_progress" type="number" min="0" max="100" placeholder="50" />
      </div>
    </div>

    <div class="timeline-section">
      <div class="tl-title">Timeline checkpoints</div>
      <div id="tlItems"></div>
      <button class="btn-add-tl" onclick="addTlItem()">+ Add checkpoint</button>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveShipment()">SAVE</button>
    </div>
    <div class="msg" id="saveMsg"></div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://rgtitrzuicoyimjjbpn.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJndGl0cnJ6dWljb3lpbWpqYnBuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MzU3OTQsImV4cCI6MjA5MDMxMTc5NH0.xQPk_EodzLqI4dGiTUOK4xWptpE0WqALspG6xmcL1xU';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const ADMIN_PASSWORD = 'vega2026';
  let editingId = null;

  function doLogin() {
    const pw = document.getElementById('pwInput').value;
    if (pw === ADMIN_PASSWORD) {
      document.getElementById('loginWrap').style.display = 'none';
      document.getElementById('dash').className = 'dash show';
      loadShipments();
    } else {
      document.getElementById('loginErr').textContent = 'Incorrect password.';
    }
  }

  function doLogout() {
    document.getElementById('loginWrap').style.display = 'flex';
    document.getElementById('dash').className = 'dash';
    document.getElementById('pwInput').value = '';
  }

  async function loadShipments() {
    const { data, error } = await sb.from('shipments').select('*').order('created_at', { ascending: false });
    const list = document.getElementById('shipList');
    if (error || !data || data.length === 0) {
      list.innerHTML = '<div class="empty">No shipments yet. Click "+ New Shipment" to add one.</div>';
      return;
    }
    list.innerHTML = data.map(s => {
      const isPending = (s.status || '').toLowerCase().includes('pending');
      return `<div class="ship-card">
        <div>
          <div class="ship-code">${s.tracking_code}</div>
          <div class="ship-route">${s.origin} → ${s.destination} &nbsp;·&nbsp; ${s.description || ''}</div>
        </div>
        <div class="ship-status ${isPending ? 'pending' : ''}">${s.status}</div>
        <div class="ship-actions">
          <button class="btn-edit" onclick="editShipment(${s.id})">Edit</button>
          <button class="btn-del" onclick="deleteShipment(${s.id})">Delete</button>
        </div>
      </div>`;
    }).join('');
  }

  function openModal(id) {
    editingId = null;
    document.getElementById('modalTitle').textContent = 'New Shipment';
    document.getElementById('f_code').value = '';
    document.getElementById('f_status').value = '';
    document.getElementById('f_origin').value = 'Dubai';
    document.getElementById('f_dest').value = 'Vienna';
    document.getElementById('f_desc').value = '';
    document.getElementById('f_weight').value = '';
    document.getElementById('f_service').value = 'Sea Freight — FCL';
    document.getElementById('f_progress').value = '0';
    document.getElementById('tlItems').innerHTML = '';
    document.getElementById('saveMsg').textContent = '';
    addTlItem();
    document.getElementById('modalBg').className = 'modal-bg open';
  }

  async function editShipment(id) {
    const { data } = await sb.from('shipments').select('*').eq('id', id).single();
    if (!data) return;
    editingId = id;
    document.getElementById('modalTitle').textContent = 'Edit Shipment';
    document.getElementById('f_code').value = data.tracking_code || '';
    document.getElementById('f_status').value = data.status || '';
    document.getElementById('f_origin').value = data.origin || '';
    document.getElementById('f_dest').value = data.destination || '';
    document.getElementById('f_desc').value = data.description || '';
    document.getElementById('f_weight').value = data.weight || '';
    document.getElementById('f_service').value = data.service || '';
    document.getElementById('f_progress').value = data.progress || 0;
    document.getElementById('saveMsg').textContent = '';

    let timeline = [];
    try { timeline = typeof data.timeline === 'string' ? JSON.parse(data.timeline) : (data.timeline || []); } catch(e) {}
    document.getElementById('tlItems').innerHTML = '';
    timeline.forEach(t => addTlItem(t));
    if (timeline.length === 0) addTlItem();

    document.getElementById('modalBg').className = 'modal-bg open';
  }

  function closeModal() {
    document.getElementById('modalBg').className = 'modal-bg';
  }

  function addTlItem(t) {
    const div = document.createElement('div');
    div.className = 'tl-item';
    div.innerHTML = `
      <input placeholder="e.g. Departed Dubai" value="${t ? t.label : ''}" />
      <input placeholder="Location" value="${t ? t.loc : ''}" />
      <select>
        <option value="done" ${t && t.state==='done' ? 'selected' : ''}>Done</option>
        <option value="active" ${t && t.state==='active' ? 'selected' : ''}>Active</option>
        <option value="pending" ${!t || t.state==='pending' ? 'selected' : ''}>Pending</option>
      </select>
      <button class="btn-rem" onclick="this.parentElement.remove()">✕</button>`;
    document.getElementById('tlItems').appendChild(div);
  }

  async function saveShipment() {
    const msg = document.getElementById('saveMsg');
    msg.style.color = '#5dca84';
    msg.textContent = 'Saving...';

    const tlNodes = document.getElementById('tlItems').querySelectorAll('.tl-item');
    const timeline = Array.from(tlNodes).map(n => {
      const inputs = n.querySelectorAll('input');
      const sel = n.querySelector('select');
      return { label: inputs[0].value, loc: inputs[1].value, date: new Date().toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'}), state: sel.value };
    });

    const payload = {
      tracking_code: document.getElementById('f_code').value.trim().toUpperCase(),
      status: document.getElementById('f_status').value.trim(),
      origin: document.getElementById('f_origin').value.trim(),
      destination: document.getElementById('f_dest').value.trim(),
      description: document.getElementById('f_desc').value.trim(),
      weight: document.getElementById('f_weight').value.trim(),
      service: document.getElementById('f_service').value.trim(),
      progress: parseInt(document.getElementById('f_progress').value) || 0,
      timeline: JSON.stringify(timeline)
    };

    let error;
    if (editingId) {
      ({ error } = await sb.from('shipments').update(payload).eq('id', editingId));
    } else {
      ({ error } = await sb.from('shipments').insert(payload));
    }

    if (error) {
      msg.style.color = '#e06060';
      msg.textContent = 'Error: ' + error.message;
    } else {
      msg.textContent = 'Saved successfully!';
      setTimeout(() => { closeModal(); loadShipments(); }, 800);
    }
  }

  async function deleteShipment(id) {
    if (!confirm('Delete this shipment?')) return;
    await sb.from('shipments').delete().eq('id', id);
    loadShipments();
  }
</script>
</body>
</html>
